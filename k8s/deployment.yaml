apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-hub-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nova-hub-app
  template:
    metadata:
      labels:
        app: nova-hub-app
    spec:
      containers:
        - name: nova-hub-app
          image: nova-hub-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
